{% extends "front/base.html" %}
{% block content %}
<div class="page-banner">
    <div class="container">
        <h1>帮助详情</h1>
        <div class="en">Help Detail</div>
    </div>
</div>
<div class="page-breadcrumb">
    <div class="container">
        <a href="{{ url_for('index') }}">首页</a>
        <span class="sep">/</span>
        <a href="{{ url_for('help_list', category=item.get('category')) }}">帮助与支持</a>
        <span class="sep">/</span>
        <span style="color:var(--accent);">{{ item.get('title') }}</span>
    </div>
</div>
<div class="container">
    <div class="page-layout">
        <aside>
            <div class="side-menu">
                <h3>帮助中心<span class="en">Help Center</span></h3>
                <ul>
                    <li><a href="{{ url_for('help_list', category='knowledge') }}">基本常识</a></li>
                    <li><a href="{{ url_for('help_list', category='download') }}">下载中心</a></li>
                </ul>
            </div>
        </aside>
        <div class="page-content">
            <div class="article-title">{{ item.get('title', '') }}</div>
            <div class="article-meta">
                <span>分类: {{ item.get('category', '') }}</span>
                <span>发布: {{ item.get('created_at', '') }}</span>
            </div>
            <div class="article-content">
                <p style="white-space: pre-line;">{{ item.get('content') or '暂无详细内容' }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
