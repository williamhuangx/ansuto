{% extends "admin/base.html" %}
{% block page_title %}网点 - {% if item and item.get('id') %}编辑{% else %}新增{% endif %}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-title">
        {% if item and item.get('id') %}编辑网点{% else %}新增网点{% endif %}
        <span class="actions"><a href="{{ url_for('admin_branches') }}" class="btn btn-sm btn-default">← 返回列表</a></span>
    </div>
    <form method="post">
        <div class="form-row">
            <div><label>网点名称 *</label><input type="text" name="branch_name" value="{{ item['branch_name'] if item else '' }}" required></div>
            <div><label>负责人</label><input type="text" name="manager" value="{{ item['manager'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>省份</label><input type="text" name="province" value="{{ item['province'] if item else '' }}"></div>
            <div><label>城市</label><input type="text" name="city" value="{{ item['city'] if item else '' }}"></div>
        </div>
        <div class="form-row full">
            <div><label>详细地址 *</label><input type="text" name="address" value="{{ item['address'] if item else '' }}" required></div>
        </div>
        <div class="form-row">
            <div><label>联系电话</label><input type="text" name="phone" value="{{ item['phone'] if item else '' }}"></div>
            <div><label>手机号</label><input type="text" name="mobile" value="{{ item['mobile'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>业务范围</label><input type="text" name="business_scope" value="{{ item['business_scope'] if item else '' }}"></div>
            <div><label>营业时间</label><input type="text" name="work_time" value="{{ item['work_time'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>经度</label><input type="number" step="0.000001" name="longitude" value="{{ item['longitude'] if item else '' }}"></div>
            <div><label>纬度</label><input type="number" step="0.000001" name="latitude" value="{{ item['latitude'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>封面图片</label><input type="text" name="cover_image" value="{{ item['cover_image'] if item else '' }}"></div>
            <div>
                <label>状态</label>
                <select name="status">
                    <option value="1" {% if not item or item.get('status', 1) == 1 %}selected{% endif %}>启用</option>
                    <option value="0" {% if item and item.get('status') == 0 %}selected{% endif %}>禁用</option>
                </select>
            </div>
        </div>
        <div class="form-row full">
            <div><label>排序(小在前)</label><input type="number" name="sort_order" value="{{ item['sort_order'] if item else 0 }}"></div>
        </div>
        <div class="form-row full">
            <div><label>网点介绍</label><textarea name="description" rows="5">{{ item['description'] if item else '' }}</textarea></div>
        </div>
        <div style="text-align:center; padding: 16px 0;">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('admin_branches') }}" class="btn btn-default">取消</a>
        </div>
    </form>
</div>
{% endblock %}
