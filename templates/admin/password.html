{% extends "admin/base.html" %}
{% block page_title %}修改密码{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px;">
    <div class="card-title">修改登录密码</div>
    <form method="post">
        <div class="form-row full">
            <div><label>当前密码 *</label><input type="password" name="old_password" required></div>
        </div>
        <div class="form-row">
            <div><label>新密码 *</label><input type="password" name="new_password" required minlength="6"></div>
            <div><label>确认新密码 *</label><input type="password" name="confirm_password" required minlength="6"></div>
        </div>
        <div style="text-align:center; padding:16px 0;">
            <button type="submit" class="btn btn-primary">更新密码</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-default">取消</a>
        </div>
    </form>
</div>
{% endblock %}
