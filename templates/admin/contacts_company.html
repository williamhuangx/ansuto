{% extends "admin/base.html" %}
{% block page_title %}公司联系方式{% endblock %}
{% block content %}
<div class="card">
    <div class="card-title">
        公司联系方式 (前台"联系我们"展示)
        <span class="actions"><a href="{{ url_for('admin_contacts') }}" class="btn btn-sm btn-default">← 客户留言</a></span>
    </div>
    <form method="post">
        <div class="form-row">
            <div><label>联系人 / 公司名</label><input type="text" name="name" value="{{ item['name'] if item else '' }}"></div>
            <div><label>公司名称</label><input type="text" name="company" value="{{ item['company'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>服务热线</label><input type="text" name="service_hotline" value="{{ item['service_hotline'] if item else '' }}"></div>
            <div><label>业务电话</label><input type="text" name="phone" value="{{ item['phone'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>邮箱</label><input type="text" name="email" value="{{ item['email'] if item else '' }}"></div>
            <div><label>传真</label><input type="text" name="fax" value="{{ item['fax'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>微信号</label><input type="text" name="wechat" value="{{ item['wechat'] if item else '' }}"></div>
            <div><label>工作时间</label><input type="text" name="work_time" value="{{ item['work_time'] if item else '' }}"></div>
        </div>
        <div class="form-row full">
            <div><label>公司地址</label><input type="text" name="address" value="{{ item['address'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>经度</label><input type="number" step="0.000001" name="longitude" value="{{ item['longitude'] if item else '' }}"></div>
            <div><label>纬度</label><input type="number" step="0.000001" name="latitude" value="{{ item['latitude'] if item else '' }}"></div>
        </div>
        <div class="form-row">
            <div><label>排序</label><input type="number" name="sort_order" value="{{ item['sort_order'] if item else 0 }}"></div>
            <div>
                <label>状态</label>
                <select name="status">
                    <option value="1" {% if not item or item.get('status', 1) == 1 %}selected{% endif %}>启用</option>
                    <option value="0" {% if item and item.get('status') == 0 %}selected{% endif %}>禁用</option>
                </select>
            </div>
        </div>
        <div style="text-align:center; padding: 16px 0;">
            <button type="submit" class="btn btn-primary">保存</button>
        </div>
    </form>
</div>
{% endblock %}
